
name: Deploy Next.js to IIS Remotely

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      SERVER: ${{ secrets.IIS_SERVER }}
      USER: ${{ secrets.IIS_USER }}
      PASSWORD: ${{ secrets.IIS_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RUN_DB_SEED: ${{ secrets.RUN_DB_SEED }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    # NOTE: Prisma migrate/seed is run on the IIS server (inside network)
    # because GitHub-hosted runners usually cannot reach private DB hosts.

    - name: Build Next.js app
      run: npm run build

    - name: Deploy to IIS via PowerShell Remoting
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $secPassword = ConvertTo-SecureString $env:PASSWORD -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential ($env:USER, $secPassword)

        $scriptBlock = {
          param($sourcePath, $destinationPath, $appPool, $siteName, $databaseUrl, $runSeed)

            Write-Host "Stopping IIS App Pool and Website..."
            try { Stop-WebAppPool -Name $appPool -ErrorAction Stop; Write-Host "App Pool '$appPool' stopped." } catch { Write-Host "Could not stop App Pool '$appPool'. It may not exist or is already stopped." }
            try { Stop-Website -Name $siteName -ErrorAction Stop; Write-Host "Website '$siteName' stopped." } catch { Write-Host "Could not stop Website '$siteName'. It may not exist or is already stopped." }

            Write-Host "Copying files to IIS at '$destinationPath'..."
            robocopy $sourcePath "$destinationPath\.next" /E /MIR
            robocopy $sourcePath\public "$destinationPath\public" /E /MIR
            robocopy $sourcePath\node_modules "$destinationPath\node_modules" /E /MIR
            robocopy $sourcePath\prisma "$destinationPath\prisma" /E /MIR
            Copy-Item "$sourcePath\package.json" "$destinationPath\package.json" -Force

            if ($LASTEXITCODE -ge 8) { throw "File copy failed with exit code $LASTEXITCODE" }
            Write-Host "Files copied successfully."

            if ([string]::IsNullOrWhiteSpace($databaseUrl)) {
              throw "DATABASE_URL is empty. Set the DATABASE_URL secret in GitHub."
            }

            Write-Host "Running Prisma migrations on IIS server (migrate deploy)..."
            Push-Location $destinationPath
            $env:DATABASE_URL = $databaseUrl
            npx prisma migrate deploy

            if ($runSeed -eq 'true') {
              Write-Host "RUN_DB_SEED=true, seeding database..."
              npm run db:seed
            } else {
              Write-Host "RUN_DB_SEED not 'true' (current: '$runSeed'); skipping seed."
            }
            Pop-Location

            Write-Host "Starting IIS App Pool and Website..."
            try { Start-WebAppPool -Name $appPool -ErrorAction Stop; Write-Host "App Pool '$appPool' started." } catch { throw "Failed to start App Pool '$appPool'." }
            try { Start-Website -Name $siteName -ErrorAction Stop; Write-Host "Website '$siteName' started." } catch { throw "Failed to start Website '$siteName'." }
        }

        $sourcePath = "${{ github.workspace }}"
        $destinationPath = "C:\inetpub\wwwroot\NIBProcur"
        $appPool = "NIBProcurment"
        $siteName = "NIBProcurment"

        Invoke-Command -ComputerName $env:SERVER -Credential $cred -ScriptBlock $scriptBlock -ArgumentList $sourcePath, $destinationPath, $appPool, $siteName, $env:DATABASE_URL, $env:RUN_DB_SEED

    - name: Notify deployment success (email)
      if: ${{ success() }}
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "Deployment Success"
        body: "Next.js app deployed successfully."
        to: ${{ secrets.NOTIFY_TO }}
        from: ${{ secrets.NOTIFY_FROM }}
        secure: true

    - name: Notify deployment failure (email)
      if: ${{ failure() }}
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_SERVER }}
        server_port: ${{ secrets.SMTP_PORT }}
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "Deployment Failed"
        body: "Next.js app deployment failed! Check workflow logs for details."
        to: ${{ secrets.NOTIFY_TO }}
        from: ${{ secrets.NOTIFY_FROM }}
        secure: true

  docker-deploy:
    name: Dockerized Deploy to Company Server
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_DOCKER == 'true' }}
    needs: build-and-deploy
    env:
      DEPLOY_HOST: ${{ secrets.IIS_SERVER }}
      DEPLOY_USER: ${{ secrets.IIS_USER }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
      SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      RUN_DB_SEED: ${{ secrets.RUN_DB_SEED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t nibprocure:ci-${{ github.sha }} .

      - name: Save image to tar
        run: |
          docker save nibprocure:ci-${{ github.sha }} -o nibprocure-image.tar

      - name: Copy image and compose files to remote server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.IIS_SERVER }}
          username: ${{ secrets.IIS_USER }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nibprocure-image.tar,docker-compose.yml,.env"
          target: ${{ secrets.DEPLOY_DIR }}

      - name: Load image and deploy on remote
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.IIS_SERVER }}
          username: ${{ secrets.IIS_USER }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_DIR }}
            # load image
            docker load -i nibprocure-image.tar || true
            # bring up services
            docker compose up -d --remove-orphans --build
            # run migrations (deploy preferred)
            if docker compose exec -T app npx prisma migrate deploy; then
              echo "migrate deploy succeeded"
            else
              echo "migrate deploy failed; attempting npm run db:migrate"
              docker compose exec -T app npm run db:migrate || true
            fi
            # optional seed
            if [ "${{ secrets.RUN_DB_SEED }}" = "true" ]; then
              docker compose exec -T app npm run db:seed || true
            fi
